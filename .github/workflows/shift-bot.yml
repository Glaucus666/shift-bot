name: Shift Handover Bot

on:
  schedule:
    # 北京 00:00 = UTC 16:00
    - cron: '0 16 * * *'
    # 北京 08:00 = UTC 00:00
    - cron: '0 0 * * *'
    # 北京 16:00 = UTC 08:00
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      shift:
        description: '交班时间 (0/8/16)'
        required: true
        default: '8'
        type: choice
        options:
          - '0'
          - '8'
          - '16'

jobs:
  handover:
    runs-on: ubuntu-latest
    timeout-minutes: 1

    steps:
      - name: Send handover notification
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHIFT="${{ github.event.inputs.shift }}"
          else
            HOUR=$(date -u +%H)
            case "$HOUR" in
              16) SHIFT=0 ;;
              00) SHIFT=8 ;;
              08) SHIFT=16 ;;
              *) echo "Not a handover hour"; exit 0 ;;
            esac
          fi

          python3 << PYEOF
          import os, sys, urllib.request, urllib.parse, json
          from datetime import date, timedelta, datetime, timezone

          SHIFT = int("$SHIFT")
          BOT_TOKEN = os.environ['TG_BOT_TOKEN']
          CHAT_ID = os.environ['TG_CHAT_ID']

          STAFF = [
              ('高尚', '@Satoshi223'),
              ('艺朗', '@earronyu2'),
              ('罡门', '@Dincoco69'),
              ('小瑜', '@username168168'),
          ]
          BASE_DATE = date(2026, 3, 29)
          CST = timezone(timedelta(hours=8))
          today = datetime.now(CST).date()

          def sched(d):
              delta = (d - BASE_DATE).days
              ri = (3 - delta % 4) % 4
              w = [s for i, s in enumerate(STAFF) if i != ri]
              return {'早': w[0], '中': w[1], '晚': w[2], '休': STAFF[ri]}

          s = sched(today)

          if SHIFT == 0:
              ys = sched(today - timedelta(days=1))
              msg = (f'🔔 交班通知 — {today.month}月{today.day}日 00:00\n\n'
                     f'⬇️ 中班下班: {ys["中"][0]} {ys["中"][1]}\n'
                     f'⬆️ 晚班上班: {s["晚"][0]} {s["晚"][1]}\n\n'
                     f'📋 今日排班:\n'
                     f'  晚 00:00~08:00  {s["晚"][0]} {s["晚"][1]}\n'
                     f'  早 08:00~16:00  {s["早"][0]} {s["早"][1]}\n'
                     f'  中 16:00~23:59  {s["中"][0]} {s["中"][1]}\n'
                     f'  休息: {s["休"][0]} {s["休"][1]}\n\n'
                     f'请做好交接！')
          elif SHIFT == 8:
              msg = (f'🔔 交班通知 — {today.month}月{today.day}日 08:00\n\n'
                     f'⬇️ 晚班下班: {s["晚"][0]} {s["晚"][1]}\n'
                     f'⬆️ 早班上班: {s["早"][0]} {s["早"][1]}\n\n'
                     f'请做好交接！')
          else:
              msg = (f'🔔 交班通知 — {today.month}月{today.day}日 16:00\n\n'
                     f'⬇️ 早班下班: {s["早"][0]} {s["早"][1]}\n'
                     f'⬆️ 中班上班: {s["中"][0]} {s["中"][1]}\n\n'
                     f'请做好交接！')

          data = urllib.parse.urlencode({'chat_id': CHAT_ID, 'text': msg}).encode()
          req = urllib.request.Request(f'https://api.telegram.org/bot{BOT_TOKEN}/sendMessage', data=data)
          resp = urllib.request.urlopen(req, timeout=10)
          r = json.loads(resp.read())
          print('发送成功' if r.get('ok') else f'失败: {r}')
          sys.exit(0 if r.get('ok') else 1)
          PYEOF
